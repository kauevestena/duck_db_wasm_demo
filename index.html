<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8"/>
<title>Global Buildings Viewer (DuckDB-WASM)</title>

<link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js"></script>

<style>
html, body { margin:0; padding:0; height:100%; }
#map { width:100%; height:100%; }

#status{
  position:absolute;
  top:10px;
  left:10px;
  background:white;
  padding:6px;
  font-family:sans-serif;
  font-size:12px;
  z-index:10;
}
</style>

</head>

<body>

<div id="map"></div>
<div id="status">Zoom ≥ 13 to load buildings</div>

<script type="module">

import * as duckdb from "https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.29.0/+esm";

const MIN_ZOOM = 13;

/* Global dataset partitioned by country */
const COUNTRY_DATASETS = {
  BRA:"https://data.source.coop/vida/google-microsoft-open-buildings/geoparquet/by_country/country_iso=BRA/*.parquet",
  USA:"https://data.source.coop/vida/google-microsoft-open-buildings/geoparquet/by_country/country_iso=USA/*.parquet",
  FRA:"https://data.source.coop/vida/google-microsoft-open-buildings/geoparquet/by_country/country_iso=FRA/*.parquet",
  IND:"https://data.source.coop/vida/google-microsoft-open-buildings/geoparquet/by_country/country_iso=IND/*.parquet",
  DEU:"https://data.source.coop/vida/google-microsoft-open-buildings/geoparquet/by_country/country_iso=DEU/*.parquet"
};

const DEFAULT_COUNTRY = "USA";

/* Map */
const map = new maplibregl.Map({
  container:"map",
  style:"https://demotiles.maplibre.org/style.json",
  center:[0,20],
  zoom:3
});

/* DuckDB */
const bundles = duckdb.getJsDelivrBundles();
const bundle = await duckdb.selectBundle(bundles);

const worker = await duckdb.createWorker(bundle.mainWorker);
const logger = new duckdb.ConsoleLogger();

const db = new duckdb.AsyncDuckDB(logger, worker);
await db.instantiate(bundle.mainModule);

const conn = await db.connect();

await conn.query(`
INSTALL spatial;
LOAD spatial;
`);

document.getElementById("status").innerText = "DuckDB ready";

/* Map layer */
map.on("load", () => {

  map.addSource("buildings", {
    type:"geojson",
    data:{type:"FeatureCollection",features:[]}
  });

  map.addLayer({
    id:"buildings",
    type:"fill",
    source:"buildings",
    paint:{
      "fill-color":"#ff5500",
      "fill-opacity":0.5
    }
  });

});

/* Simple country heuristic */
function detectCountry(lon){

  if(lon > -130 && lon < -60) return "USA";
  if(lon > -75 && lon < -30) return "BRA";
  if(lon > -10 && lon < 30) return "FRA";
  if(lon > 70 && lon < 90) return "IND";

  return DEFAULT_COUNTRY;
}

/* Query */
async function loadBuildings(){

  if(map.getZoom() < MIN_ZOOM){
    document.getElementById("status").innerText =
      "Zoom ≥ " + MIN_ZOOM;
    return;
  }

  const bounds = map.getBounds();

  const xmin = bounds.getWest();
  const xmax = bounds.getEast();
  const ymin = bounds.getSouth();
  const ymax = bounds.getNorth();

  const center = map.getCenter();
  const country = detectCountry(center.lng);

  const dataset = COUNTRY_DATASETS[country] || COUNTRY_DATASETS[DEFAULT_COUNTRY];

  document.getElementById("status").innerText =
    "Loading " + country + " buildings...";

  const sql = `
  SELECT
    ST_AsGeoJSON(geometry) AS geom
  FROM read_parquet('${dataset}')
  WHERE
    bbox.xmin < ${xmax}
    AND bbox.xmax > ${xmin}
    AND bbox.ymin < ${ymax}
    AND bbox.ymax > ${ymin}
  LIMIT 3000
  `;

  const result = await conn.query(sql);
  const rows = result.toArray();

  const features = rows.map(r => ({
    type:"Feature",
    geometry:JSON.parse(r.geom),
    properties:{}
  }));

  map.getSource("buildings").setData({
    type:"FeatureCollection",
    features
  });

  document.getElementById("status").innerText =
    features.length + " buildings";
}

map.on("moveend", loadBuildings);

</script>

</body>
</html>
