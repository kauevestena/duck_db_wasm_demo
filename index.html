<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8"/>
<title>Global Buildings Viewer (DuckDB-WASM)</title>

<link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js"></script>

<style>
html, body { margin:0; padding:0; height:100%; }
#map { width:100%; height:100%; }

#status{
  position:absolute;
  top:10px;
  left:10px;
  background:white;
  padding:6px;
  font-family:sans-serif;
  font-size:12px;
  z-index:10;
}
</style>

</head>

<body>

<div id="map"></div>
<div id="status">Zoom ≥ 13 to load buildings</div>

<script type="module">

import * as duckdb from "https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.29.0/+esm";

const MIN_ZOOM = 13;

/* Load country list from external file */
let countriesData;
try {
  const countriesResponse = await fetch("countries.json");
  if(!countriesResponse.ok) throw new Error("HTTP " + countriesResponse.status);
  countriesData = await countriesResponse.json();
} catch(e) {
  console.error("Failed to load countries.json:", e);
  countriesData = {
    url_template:"https://data.source.coop/vida/google-microsoft-open-buildings/geoparquet/by_country/country_iso={code}/{code}.parquet",
    default_country:"USA",
    countries:[]
  };
}

const URL_TEMPLATE = countriesData.url_template;
const DEFAULT_COUNTRY = countriesData.default_country;
const COUNTRIES = countriesData.countries;

/* Map */
const map = new maplibregl.Map({
  container:"map",
  style:"https://demotiles.maplibre.org/style.json",
  center:[0,20],
  zoom:3
});

/* DuckDB */
const bundles = duckdb.getJsDelivrBundles();
const bundle = await duckdb.selectBundle(bundles);

const worker = await duckdb.createWorker(bundle.mainWorker);
const logger = new duckdb.ConsoleLogger();

const db = new duckdb.AsyncDuckDB(logger, worker);
await db.instantiate(bundle.mainModule);

const conn = await db.connect();

await conn.query("INSTALL spatial;");
await conn.query("LOAD spatial;");

document.getElementById("status").innerText = "DuckDB ready";

/* Map layer */
map.on("load", () => {

  map.addSource("buildings", {
    type:"geojson",
    data:{type:"FeatureCollection",features:[]}
  });

  map.addLayer({
    id:"buildings",
    type:"fill",
    source:"buildings",
    paint:{
      "fill-color":"#ff5500",
      "fill-opacity":0.5
    }
  });

});

/* Detect country from lon/lat using bounding box lookup */
function detectCountry(lon, lat){

  let best = null;
  let bestDepth = -1;

  for(const c of COUNTRIES){
    const [minLon, minLat, maxLon, maxLat] = c.bbox;
    if(lon >= minLon && lon <= maxLon && lat >= minLat && lat <= maxLat){
      const w = maxLon - minLon;
      const h = maxLat - minLat;
      if(w === 0 || h === 0) continue;
      const depth = Math.min(
        (lon - minLon) / w, (maxLon - lon) / w,
        (lat - minLat) / h, (maxLat - lat) / h
      );
      if(depth > bestDepth){
        best = c.code;
        bestDepth = depth;
      }
    }
  }

  return best || DEFAULT_COUNTRY;
}

/* Query */
async function loadBuildings(){

  if(!map.getSource("buildings")) return;

  if(map.getZoom() < MIN_ZOOM){
    document.getElementById("status").innerText =
      "Zoom ≥ " + MIN_ZOOM;
    return;
  }

  const bounds = map.getBounds();

  const xmin = bounds.getWest();
  const xmax = bounds.getEast();
  const ymin = bounds.getSouth();
  const ymax = bounds.getNorth();

  const center = map.getCenter();
  const country = detectCountry(center.lng, center.lat);

  const dataset = URL_TEMPLATE.replaceAll("{code}", country);

  document.getElementById("status").innerText =
    "Loading " + country + " buildings...";

  try {

    const sql = `
    SELECT
      ST_AsGeoJSON(geometry) AS geom
    FROM read_parquet('${dataset}')
    WHERE
      bbox.xmin < ${xmax}
      AND bbox.xmax > ${xmin}
      AND bbox.ymin < ${ymax}
      AND bbox.ymax > ${ymin}
    LIMIT 3000
    `;

    const result = await conn.query(sql);
    const rows = result.toArray();

    const features = rows.map(r => ({
      type:"Feature",
      geometry:JSON.parse(r.geom),
      properties:{}
    }));

    const source = map.getSource("buildings");
    if(!source) return;
    source.setData({
      type:"FeatureCollection",
      features
    });

    document.getElementById("status").innerText =
      features.length + " buildings";

  } catch(e) {
    console.error("loadBuildings error:", e);
    document.getElementById("status").innerText = "Error: " + e.message;
  }
}

map.on("moveend", loadBuildings);

</script>

</body>
</html>
